// ================================================================
// Google Visualization API (JSONP) でデータ取得
// CORSを回避するためscriptタグで読み込む
// ================================================================
function loadSheetData() {
  return new Promise((resolve, reject) => {
    const cbName = '__gvizCb' + Date.now();

    window[cbName] = function(resp) {
      try {
        const old = document.getElementById('__gvizScript');
        if (old) old.remove();
        delete window[cbName];

        const table = resp && resp.table;
        if (!table) { resolve([]); return; }

        const headers = table.cols.map(c => c.label || c.id || '');
        const rows = (table.rows || []).map(row => {
          const obj = {};
          headers.forEach((h, i) => {
            const cell = row.c ? row.c[i] : null;
            let val = '';
            if (cell != null) {
              // 日付型は f（書式済み文字列）を優先して使う
              if (cell.f != null) val = String(cell.f);
              else if (cell.v != null) val = String(cell.v);
            }
            obj[h] = val;
          });
          return obj;
        }).filter(row => Object.values(row).some(v => v !== ''));

        resolve(rows);
      } catch(e) { reject(e); }
    };

    const script = document.createElement('script');
    script.id = '__gvizScript';
    const SHEET_ID = '1jdfpZdQcCCZa2A1-cCKBL9yxWUKJ3O7CyEQbQ71Jljc';
    const GID      = '1497922169';
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cbName}&gid=${GID}&t=${Date.now()}`;
    script.onerror = () => { delete window[cbName]; reject(new Error('Script load error')); };
    document.head.appendChild(script);
  });
}

// ================================================================
// データ読み込み
// ================================================================
async function loadData() {
  document.getElementById('loading').style.display = 'block';

  document.getElementById('errorBanner').style.display = 'none';

  let hasError = false;
  try {
    allData = await loadSheetData();
    if (allData.length === 0) throw new Error('データが空です');
  } catch (e) {
    console.warn('データ取得失敗:', e);
    allData = getDemoData();
    hasError = true;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  if (hasError) document.getElementById('errorBanner').style.display = 'flex';
  document.getElementById('lastUpdated').textContent =
    '最終更新: ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

  updateAll();
}

function updateAll() {
  updateSummary();
  updateMonthlyChart();
  updateStaffTable();
  updateGenreChart();
  updateAgeChart();
  updateThisMonth();
  renderTable();
}

// ================================================================
// ① サマリーカード
// ================================================================
function updateSummary() {
  const total   = allData.length;
  const nyukai  = allData.filter(d => statusGroup(d['入会']) === '入会').length;
  const kentou  = allData.filter(d => statusGroup(d['入会']) === '検討中').length;
  const rate    = total > 0 ? Math.round(nyukai / total * 100) : 0;

  const now = new Date();
  const thisMonth = toYYYYMM(now);
  const tmData    = allData.filter(d => dateStr(d).startsWith(thisMonth));
  const tmNyukai  = tmData.filter(d => statusGroup(d['入会']) === '入会').length;

  const today   = new Date();
  const expired = allData.filter(d => statusGroup(d['入会']) === '検討中' && d['検討中の場合の期限'] && new Date(d['検討中の場合の期限']) < today).length;

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statTotalSub').textContent = '今月 ' + tmData.length + '件';
  document.getElementById('statNyukai').textContent   = nyukai;
  document.getElementById('statNyukaiSub').textContent = '今月 ' + tmNyukai + '件';
  document.getElementById('statRate').textContent     = rate + '%';
  document.getElementById('progressBar').style.width  = rate + '%';
  document.getElementById('statKentou').textContent   = kentou;

  const kentouSub = document.getElementById('statKentouSub');
  if (expired > 0) {
    kentouSub.textContent    = '⚠ 期限切れ ' + expired + '件';
    kentouSub.style.color    = '#DC2626';
  } else {
    kentouSub.textContent    = '期限切れなし';
    kentouSub.style.color    = '';
  }
}

// ================================================================
// ② 月別推移グラフ
// ================================================================
function setPeriod(n) {
  currentPeriod = n;
  ['btn3m','btn6m','btnAll'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(n===3?'btn3m':n===6?'btn6m':'btnAll').classList.add('active');
  updateMonthlyChart();
}

function updateMonthlyChart() {
  const map = {};
  allData.forEach(d => {
    const m = dateStr(d).substring(0,7);
    if (!m || m.length < 7) return;
    if (!map[m]) map[m] = {total:0, nyukai:0};
    map[m].total++;
    if (statusGroup(d['入会']) === '入会') map[m].nyukai++;
  });

  let months = Object.keys(map).sort();
  if (currentPeriod > 0) months = months.slice(-currentPeriod);

  const labels  = months.map(m => m.slice(2,4) + '/' + m.slice(5,7));
  const totals  = months.map(m => map[m].total);
  const nyukais = months.map(m => map[m].nyukai);
  const rates   = months.map(m => map[m].total > 0 ? Math.round(map[m].nyukai / map[m].total * 100) : 0);

  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('monthlyChart'), {
    data: {
      labels,
      datasets: [
        { type:'bar',  label:'相談数',    data:totals,  backgroundColor:'#BFDBFE', borderColor:'#3B82F6', borderWidth:1, borderRadius:4, yAxisID:'y' },
        { type:'bar',  label:'入会数',    data:nyukais, backgroundColor:'#A7F3D0', borderColor:'#059669', borderWidth:1, borderRadius:4, yAxisID:'y' },
        { type:'line', label:'転換率(%)', data:rates,   borderColor:'#F59E0B', backgroundColor:'transparent', borderWidth:2.5, pointBackgroundColor:'#F59E0B', pointRadius:4, tension:0.35, yAxisID:'y1' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { position:'bottom', labels:{ boxWidth:12, font:{size:11} } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label==='転換率(%)' ? ` ${ctx.dataset.label}: ${ctx.parsed.y}%` : ` ${ctx.dataset.label}: ${ctx.parsed.y}件` } }
      },
      scales: {
        y:  { type:'linear', position:'left',  ticks:{stepSize:1,font:{size:11}}, grid:{color:'#F1F5F9'} },
        y1: { type:'linear', position:'right', max:100, ticks:{callback:v=>v+'%',font:{size:11}}, grid:{drawOnChartArea:false} },
        x:  { ticks:{font:{size:11}}, grid:{color:'#F1F5F9'} }
      }
    }
  });
}

// ================================================================
// 担当者別実績
// ================================================================
function updateStaffTable() {
  const map = {};
  allData.forEach(d => {
    const s = d['担当者'] || '不明';
    if (!map[s]) map[s] = {total:0,nyukai:0};
    map[s].total++;
    if (statusGroup(d['入会'])==='入会') map[s].nyukai++;
  });

  const list = Object.entries(map).sort((a,b) => b[1].total - a[1].total);
  const maxTotal = Math.max(...list.map(([,v]) => v.total), 1);

  let html = '<div class="d-flex flex-column gap-3">';
  list.forEach(([name, v]) => {
    const rate = v.total > 0 ? Math.round(v.nyukai / v.total * 100) : 0;
    const bar  = Math.round(v.total / maxTotal * 100);
    html += `
      <div>
        <div class="d-flex justify-content-between align-items-center mb-1">
          <span class="fw-semibold small">${name}</span>
          <span class="text-muted small">
            ${v.nyukai}/${v.total}件
            <span class="fw-bold ms-1" style="color:#4F46E5;">${rate}%</span>
          </span>
        </div>
        <div class="progress-bar-custom">
          <div class="progress-fill" style="width:${bar}%;"></div>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('staffTable').innerHTML = html;
}

// ================================================================
// 撮影ジャンル別
// ================================================================
function updateGenreChart() {
  const map = {};
  allData.filter(d => statusGroup(d['入会'])==='入会').forEach(d => {
    const g = d['撮影ジャンル'] || 'その他';
    map[g] = (map[g] || 0) + 1;
  });

  const labels = Object.keys(map);
  const vals   = Object.values(map);
  const colors = ['#4F46E5','#059669','#D97706','#DC2626','#7C3AED','#0891B2','#BE185D','#065F46','#92400E'];

  if (charts.genre) charts.genre.destroy();
  charts.genre = new Chart(document.getElementById('genreChart'), {
    type:'doughnut',
    data: {
      labels,
      datasets: [{ data:vals, backgroundColor:colors.slice(0,labels.length), borderWidth:2, borderColor:'#fff' }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend:{ position:'bottom', labels:{boxWidth:12, font:{size:11}} } }
    }
  });
}

// ================================================================
// 年齢別グラフ
// ================================================================
function updateAgeChart() {
  const bands = {
    '〜24歳':{t:0,n:0}, '25-29歳':{t:0,n:0}, '30-34歳':{t:0,n:0}, '35-39歳':{t:0,n:0},
    '40代':{t:0,n:0}, '50代':{t:0,n:0}, '60代':{t:0,n:0}, '70代〜':{t:0,n:0}
  };
  allData.forEach(d => {
    const age = parseInt(d['年齢'] || '0');
    const key = age < 25 ? '〜24歳'
              : age < 30 ? '25-29歳'
              : age < 35 ? '30-34歳'
              : age < 40 ? '35-39歳'
              : age < 50 ? '40代'
              : age < 60 ? '50代'
              : age < 70 ? '60代'
              : '70代〜';
    bands[key].t++;
    if (statusGroup(d['入会'])==='入会') bands[key].n++;
  });

  const labels = Object.keys(bands);
  if (charts.age) charts.age.destroy();
  charts.age = new Chart(document.getElementById('ageChart'), {
    type:'bar',
    data: {
      labels,
      datasets: [
        { label:'相談数', data:labels.map(l=>bands[l].t), backgroundColor:'#BFDBFE', borderColor:'#3B82F6', borderWidth:1, borderRadius:3 },
        { label:'入会数', data:labels.map(l=>bands[l].n), backgroundColor:'#A7F3D0', borderColor:'#059669', borderWidth:1, borderRadius:3 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend:{ position:'bottom', labels:{boxWidth:12, font:{size:11}} } },
      scales: {
        y: { ticks:{stepSize:1, font:{size:10}}, grid:{color:'#F1F5F9'} },
        x: { ticks:{font:{size:10}}, grid:{color:'#F1F5F9'} }
      }
    }
  });
}

// ================================================================
// 月別サマリー（◀▶で月切り替え可）
// ================================================================
function shiftMonth(delta) {
  const base = selectedMonth || toYYYYMM(new Date());
  const [y, m] = base.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  selectedMonth = toYYYYMM(d);
  updateThisMonth();
}

function updateThisMonth() {
  const now      = new Date();
  const todayStr = toYYYYMM(now);
  if (!selectedMonth) selectedMonth = todayStr;

  // ラベル更新（例：5月, 4月）
  const [sy, sm] = selectedMonth.split('-').map(Number);
  document.getElementById('selectedMonthLabel').textContent = sm + '月';

  // 次月ボタン：今月より先はdisable
  const nextBtn = document.getElementById('nextMonthBtn');
  if (nextBtn) nextBtn.disabled = (selectedMonth >= todayStr);

  const tmData = allData.filter(d => dateStr(d).startsWith(selectedMonth));

  const nyukai  = tmData.filter(d => statusGroup(d['入会'])==='入会').length;
  const kentou  = tmData.filter(d => statusGroup(d['入会'])==='検討中').length;
  const miokuri = tmData.filter(d => statusGroup(d['入会'])==='見送り').length;
  const rate    = tmData.length > 0 ? Math.round(nyukai / tmData.length * 100) : 0;

  // 期限が近い（30日以内）— 今月表示時のみ
  const today    = new Date();
  const isThisMonth = (selectedMonth === todayStr);
  const upcoming = isThisMonth ? allData
    .filter(d => {
      if (statusGroup(d['入会']) !== '検討中') return false;
      const dl = d['検討中の場合の期限'];
      if (!dl) return false;
      const diff = (new Date(dl) - today) / 86400000;
      return diff >= 0 && diff <= 30;
    })
    .sort((a,b) => new Date(a['検討中の場合の期限']) - new Date(b['検討中の場合の期限']))
    : [];

  const isCurrentMonth = selectedMonth === todayStr;
  const monthLabel = isCurrentMonth ? `${sm}月（今月）の実績` : `${sy}年${sm}月の実績`;

  let html = `
    <div class="mb-3">
      <div class="text-muted small mb-2 fw-semibold">${monthLabel}</div>
      <div class="d-flex gap-2 flex-wrap">
        <div class="text-center p-2 rounded" style="background:#EEF2FF; min-width:60px;">
          <div class="fw-bold" style="color:#4F46E5; font-size:1.4rem;">${tmData.length}</div>
          <div class="text-muted" style="font-size:0.7rem;">相談数</div>
        </div>
        <div class="text-center p-2 rounded" style="background:#ECFDF5; min-width:60px;">
          <div class="fw-bold" style="color:#059669; font-size:1.4rem;">${nyukai}</div>
          <div class="text-muted" style="font-size:0.7rem;">入会</div>
        </div>
        <div class="text-center p-2 rounded" style="background:#FFFBEB; min-width:60px;">
          <div class="fw-bold" style="color:#D97706; font-size:1.4rem;">${kentou}</div>
          <div class="text-muted" style="font-size:0.7rem;">検討中</div>
        </div>
        <div class="text-center p-2 rounded" style="background:#F3F4F6; min-width:60px;">
          <div class="fw-bold" style="color:#6B7280; font-size:1.4rem;">${miokuri}</div>
          <div class="text-muted" style="font-size:0.7rem;">見送り</div>
        </div>
      </div>
      <div class="mt-2">
        <div class="d-flex justify-content-between small mb-1">
          <span class="text-muted">転換率</span>
          <span class="fw-bold" style="color:#4F46E5;">${rate}%</span>
        </div>
        <div class="progress-bar-custom">
          <div class="progress-fill" style="width:${rate}%;"></div>
        </div>
      </div>
    </div>`;

  if (upcoming.length > 0) {
    html += `<div>
      <div class="text-muted small fw-semibold mb-2">⏰ 検討中 — 期限まで30日以内</div>
      <div class="d-flex flex-column gap-1">`;
    upcoming.slice(0, 4).forEach(d => {
      const diff = Math.ceil((new Date(d['検討中の場合の期限']) - today) / 86400000);
      html += `<div class="d-flex justify-content-between align-items-center px-2 py-1 rounded" style="background:#FFFBEB;">
        <span class="small fw-semibold">${d['お名前']}</span>
        <span class="small fw-bold" style="color:#D97706;">残${diff}日</span>
      </div>`;
    });
    html += '</div></div>';
  }

  if (tmData.length === 0) {
    html += `<div class="text-center text-muted small py-3">この月のデータはありません</div>`;
  }

  document.getElementById('thisMonthStats').innerHTML = html;
}

// ================================================================
// 個別データ一覧
// ================================================================
function filterTable(filter, btn) {
  currentFilter = filter;
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderTable();
}

function renderTable() {
  const search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const today  = new Date();

  let filtered = allData.filter(d => {
    if (currentFilter !== 'all' && statusGroup(d['入会']) !== currentFilter) return false;
    if (search && !(d['お名前'] || '').toLowerCase().includes(search)) return false;
    return true;
  });

  // 実施日の新しい順
  filtered.sort((a, b) => dateStr(b).localeCompare(dateStr(a)));

  let html = '';
  filtered.forEach(d => {
    const status    = d['入会'] || '';
    const grp       = statusGroup(status);
    const deadline  = d['検討中の場合の期限'] || '';
    const expired   = deadline && new Date(deadline) < today;

    let statusHtml = '';
    let rowClass   = '';

    if (grp === '入会') {
      statusHtml = `<span class="status-pill status-nyukai">✓ ${status}</span>`;
    } else if (grp === '検討中') {
      if (expired) {
        statusHtml = `<span class="status-pill status-expired">⚠ ${status}</span>`;
        rowClass   = 'row-expired';
      } else {
        statusHtml = `<span class="status-pill status-kentou">⏳ ${status}</span>`;
        rowClass   = 'row-kentou';
      }
    } else if (grp === '見送り') {
      statusHtml = `<span class="status-pill status-miokuri">${status}</span>`;
    } else {
      statusHtml = `<span class="status-pill status-miokuri">${status}</span>`;
    }

    let deadlineHtml = '<span class="text-muted small">—</span>';
    if (deadline) {
      const diff  = Math.ceil((new Date(deadline) - today) / 86400000);
      const color = expired ? '#DC2626' : diff <= 14 ? '#D97706' : '#374151';
      const sub   = expired ? '<br><small style="font-size:0.7rem;">期限切れ</small>'
                            : diff <= 14 ? `<br><small style="font-size:0.7rem;">残${diff}日</small>` : '';
      deadlineHtml = `<span style="color:${color}; font-size:0.82rem;">${deadline}${sub}</span>`;
    }

    const insta = d['インスタアカウント'] || '';
    const instaHtml = insta
      ? `<a href="https://instagram.com/${insta.replace('@','')}" target="_blank" rel="noopener" class="text-decoration-none small text-primary">${insta}</a>`
      : '<span class="text-muted small">—</span>';

    html += `<tr class="${rowClass}">
      <td class="text-nowrap small">${d['実施日'] || '—'}</td>
      <td class="fw-semibold small">${d['お名前'] || '—'}</td>
      <td class="small"><span class="tag-pill">${d['担当者'] || '—'}</span></td>
      <td class="small">${d['撮影ジャンル'] || '—'}</td>
      <td class="text-center small">${d['年齢'] ? d['年齢']+'歳' : '—'}</td>
      <td class="small">${d['活動地域'] || '—'}</td>
      <td>${statusHtml}</td>
      <td>${deadlineHtml}</td>
      <td>${instaHtml}</td>
    </tr>`;
  });

  document.getElementById('dataTableBody').innerHTML =
    html || '<tr><td colspan="9" class="text-center text-muted py-4">データがありません</td></tr>';
  document.getElementById('tableFooter').textContent =
    `${filtered.length}件表示 / 全${allData.length}件`;
}

// ================================================================
// ステータス判定（実際のスプレッドシートの値に対応）
// ================================================================
function statusGroup(val) {
  if (val === '希望・フォーム回答済' || val === '希望・入金まで完了') return '入会';
  if (val === '検討中' || val === '希望・フォーム未回答')             return '検討中';
  if (val === '見送る'  || val === '案内していないため無し')           return '見送り';
  return '不明';
}

// ================================================================
// ユーティリティ
// ================================================================
function dateStr(d) {
  // スラッシュ区切りをハイフン区切りに統一（例: 2026/02/01 → 2026-02-01）
  const raw = d['実施日'] || d['タイムスタンプ'] || '';
  return raw.replace(/\//g, '-');
}
function toYYYYMM(date) {
  return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0');
}

// ================================================================
// 起動
// ================================================================
window.addEventListener('DOMContentLoaded', () => {
  loadData();
});
</script>
